[supervisord]
nodaemon=true
logfile=/dev/stdout
logfile_maxbytes=0

[program:mariadb]
command=/usr/bin/mysqld_safe --datadir=/data/mysql
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:apache]
command=docker-entrypoint.sh apache2-foreground
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
