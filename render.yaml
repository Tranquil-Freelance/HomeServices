# WordPress cannot use Render Postgres without non-standard drivers. We use a private MySQL service.
#
# If you see "Error establishing a database connection" / getaddrinfo failed:
# 1) Private MySQL must exist and be Running (Dashboard → home-services-mysql).
# 2) Web + MySQL must be same Render region (below: oregon) and workspace.
# 3) WORDPRESS_DB_HOST must be linked from the MySQL service (Blueprint / Environment →
#    reference icon), NOT a guessed name. Internal host often looks like name+suffix
#    (see MySQL service → Connect / internal address).
# 4) Apply this file as a Blueprint so both services are created together, or link manually.
# 5) Professional "environment isolation" can block cross-environment traffic — keep both
#    services in the same environment/project.
previews:
  generation: manual
services:
  - type: pserv
    name: home-services-mysql
    runtime: docker
    repo: https://github.com/render-examples/mysql
    branch: main
    region: oregon
    plan: starter
    autoDeploy: false
    disk:
      name: mysql-data
      mountPath: /var/lib/mysql
      sizeGB: 10
    envVars:
      - key: MYSQL_DATABASE
        value: wordpress
      - key: MYSQL_USER
        value: wordpress
      - key: MYSQL_PASSWORD
        generateValue: true
      - key: MYSQL_ROOT_PASSWORD
        generateValue: true

  # Web: themes are baked into the image; start.sh overwrites wp-content/themes/ashade* on boot
  # so WordPress’s entrypoint “skip existing folders” behavior cannot leave stale child theme files.
  # If a deploy still looks old: Render Dashboard → Manual Deploy → “Clear build cache & deploy”.
  - type: web
    name: home-services
    runtime: docker
    # No MariaDB in-container; 512MB is usually enough for PHP + Apache + import.
    plan: starter
    region: oregon
    autoDeploy: "yes"
    disk:
      name: wordpress-uploads
      mountPath: /var/www/html/wp-content/uploads
      sizeGB: 5
    envVars:
      # Use `host` only — `hostport` is the HTTP probe port (10000), not MySQL (3306).
      - key: WORDPRESS_DB_HOST
        fromService:
          name: home-services-mysql
          type: pserv
          property: host
      - key: WORDPRESS_DB_USER
        value: wordpress
      - key: WORDPRESS_DB_PASSWORD
        fromService:
          name: home-services-mysql
          type: pserv
          envVarKey: MYSQL_PASSWORD
      - key: WORDPRESS_DB_NAME
        value: wordpress
