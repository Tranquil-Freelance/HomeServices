# WordPress cannot use Render Postgres without non-standard drivers. We use a private MySQL service.
services:
  - type: pserv
    name: home-services-mysql
    runtime: docker
    repo: https://github.com/render-examples/mysql
    branch: main
    region: oregon
    plan: starter
    autoDeploy: false
    disk:
      name: mysql-data
      mountPath: /var/lib/mysql
      sizeGB: 10
    envVars:
      - key: MYSQL_DATABASE
        value: wordpress
      - key: MYSQL_USER
        value: wordpress
      - key: MYSQL_PASSWORD
        generateValue: true
      - key: MYSQL_ROOT_PASSWORD
        generateValue: true

  - type: web
    name: home-services
    runtime: docker
    # No MariaDB in-container; 512MB is usually enough for PHP + Apache + import.
    plan: starter
    region: oregon
    autoDeploy: "yes"
    disk:
      name: wordpress-uploads
      mountPath: /var/www/html/wp-content/uploads
      sizeGB: 5
    envVars:
      # Use `host` only — `hostport` is the HTTP probe port (10000), not MySQL (3306).
      - key: WORDPRESS_DB_HOST
        fromService:
          name: home-services-mysql
          type: pserv
          property: host
      - key: WORDPRESS_DB_USER
        value: wordpress
      - key: WORDPRESS_DB_PASSWORD
        fromService:
          name: home-services-mysql
          type: pserv
          envVarKey: MYSQL_PASSWORD
      - key: WORDPRESS_DB_NAME
        value: wordpress
