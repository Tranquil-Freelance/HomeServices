services:
  - type: web
    name: home-services
    runtime: docker
    plan: starter
    region: oregon
    autoDeploy: "yes"
    disk:
      name: wordpress-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: WORDPRESS_DB_HOST
        value: 127.0.0.1
      - key: WORDPRESS_DB_USER
        value: wordpress
      - key: WORDPRESS_DB_PASSWORD
        value: wordpress
      - key: WORDPRESS_DB_NAME
        value: wordpress
